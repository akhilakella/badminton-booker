<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f0f13"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Court Booker"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.svg"/>
  <title>Court Booker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #17171f;
      --card2: #1e1e28;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f5;
      --muted: #6b6b80;
      --accent: #c8f135;
      --accent-dim: rgba(200,241,53,0.12);
      --success: #1D9E75;
      --success-dim: rgba(29,158,117,0.12);
      --warn: #EF9F27;
      --warn-dim: rgba(239,159,39,0.12);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none; z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px calc(80px + var(--safe-bot)); }

    /* HEADER */
    .topbar {
      padding: calc(var(--safe-top) + 20px) 0 16px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .topbar-left {}
    .venue-tag {
      font-size: 11px; font-weight: 400; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
    }
    .app-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px; line-height: 1; letter-spacing: 1px; color: var(--text);
    }
    .app-title span { color: var(--accent); }
    .shuttle {
      font-size: 32px;
      animation: float 3s ease-in-out infinite;
      display: block;
    }
    @keyframes float {
      0%,100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(-6px) rotate(8deg); }
    }

    /* DAY TABS */
    .day-tabs {
      display: flex; gap: 8px; margin: 16px 0 20px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 2px;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex-shrink: 0;
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 400;
      color: var(--muted);
      background: transparent; cursor: pointer;
      transition: all 0.18s;
    }
    .day-tab:active { transform: scale(0.96); }
    .day-tab.active {
      background: var(--accent-dim);
      border-color: rgba(200,241,53,0.3);
      color: var(--accent);
      font-weight: 500;
    }

    /* SLOT CARDS */
    .slots { display: flex; flex-direction: column; gap: 12px; }

    .slot-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .slot-card.all-booked { border-color: rgba(29,158,117,0.25); }

    .slot-top {
      padding: 16px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .slot-time-wrap {}
    .slot-label { font-size: 11px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
    .slot-time { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; color: var(--text); line-height: 1; }

    .slot-status {
      font-size: 11px; font-weight: 500; padding: 4px 12px;
      border-radius: 20px; letter-spacing: 0.3px;
    }
    .slot-status.all { background: var(--success-dim); color: var(--success); }
    .slot-status.partial { background: var(--warn-dim); color: var(--warn); }
    .slot-status.none { background: rgba(255,255,255,0.05); color: var(--muted); }

    .slot-players {
      padding: 0 16px 14px;
      display: flex; gap: 8px;
    }

    .player {
      flex: 1;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .player:active { transform: scale(0.97); }
    .player.booked { border-color: rgba(29,158,117,0.3); background: rgba(29,158,117,0.06); }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; flex-shrink: 0;
    }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-status { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .player.booked .player-status { color: var(--success); }

    .check-icon {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .player.booked .check-icon {
      background: var(--success);
      border-color: var(--success);
    }
    .check-icon svg { display: none; }
    .player.booked .check-icon svg { display: block; }

    .slot-footer {
      border-top: 1px solid var(--border);
      display: flex;
    }
    .slot-action {
      flex: 1; padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 400;
      color: var(--muted); background: transparent;
      border: none; cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .slot-action:active { background: rgba(255,255,255,0.04); }
    .slot-action + .slot-action { border-left: 1px solid var(--border); }
    .slot-action.primary { color: var(--accent); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(12px + var(--safe-bot));
      background: rgba(15,15,19,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      z-index: 50;
    }
    .nav-info { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .nav-info strong { color: var(--text); font-weight: 500; }
    .reset-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--muted);
      background: transparent; border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:active { background: rgba(255,255,255,0.05); }

    /* MODAL */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100; align-items: flex-end; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px calc(24px + var(--safe-bot));
      width: 100%; max-width: 480px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 20px; }
    .modal h3 { font-size: 17px; font-weight: 500; margin-bottom: 4px; }
    .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.3px; }
    .modal-field input {
      width: 100%; background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; padding: 12px 14px; outline: none;
      transition: border-color 0.15s;
    }
    .modal-field input:focus { border-color: rgba(200,241,53,0.4); }
    .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
    .modal-btn {
      flex: 1; padding: 14px;
      border-radius: 12px; border: 1px solid var(--border2);
      font-family: 'DM Sans', sans-serif; font-size: 15px;
      cursor: pointer; transition: all 0.15s;
    }
    .modal-btn.cancel { background: transparent; color: var(--muted); }
    .modal-btn.save { background: var(--accent); color: #0f0f13; font-weight: 500; border-color: var(--accent); }
    .modal-btn:active { transform: scale(0.98); }

    /* TOAST */
    .toast {
      position: fixed; bottom: calc(80px + var(--safe-bot) + 12px);
      left: 50%; transform: translateX(-50%) translateY(10px);
      background: var(--card2); border: 1px solid var(--border2);
      border-radius: 20px; padding: 10px 20px;
      font-size: 13px; color: var(--text);
      opacity: 0; transition: all 0.2s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* LOADING */
    .loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="venue-tag">Queen's Diamond Jubilee · Rugby</div>
      <div class="app-title">Court<span>Booker</span></div>
    </div>
    <span class="shuttle">🏸</span>
  </div>

  <div class="day-tabs">
    <button class="day-tab" onclick="setDay('monday',this)">Monday</button>
    <button class="day-tab" onclick="setDay('wednesday',this)">Wednesday</button>
    <button class="day-tab active" onclick="setDay('thursday',this)">Thursday</button>
  </div>

  <div class="slots" id="slots">
    <div class="loading">Loading bookings...</div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-info">
    <strong id="nav-day">Thursday</strong><br>
    <span id="nav-date">loading...</span>
  </div>
  <button class="reset-btn" onclick="confirmReset()">Reset week</button>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Edit players</h3>
    <p id="modal-sub">Update who plays in this slot</p>
    <div class="modal-field"><label>Player 1</label><input id="inp1" type="text"/></div>
    <div class="modal-field"><label>Player 2</label><input id="inp2" type="text"/></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#5DCAA5','#AFA9EC','#85B7EB','#F0997B','#97C459','#FAC775'];
const nameColors = {};
let colorIdx = 0;
function color(name) {
  if (!nameColors[name]) nameColors[name] = COLORS[colorIdx++ % COLORS.length];
  return nameColors[name];
}
function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

let state = null;
let currentDay = 'thursday';
let editingSlot = null;

async function loadData() {
  try {
    const r = await fetch('/api/bookings');
    state = await r.json();
    render();
  } catch(e) {
    document.getElementById('slots').innerHTML = '<div class="loading">Couldn\'t load bookings. Check connection.</div>';
  }
}

async function saveData() {
  try {
    await fetch('/api/bookings', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(state)
    });
  } catch(e) { console.error('Save failed', e); }
}

function setDay(day, el) {
  currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('nav-day').textContent = day.charAt(0).toUpperCase() + day.slice(1);
  render();
}

function render() {
  if (!state) return;
  const slots = state[currentDay];
  const container = document.getElementById('slots');
  container.innerHTML = '';

  // Update nav date
  const nextDate = getNextDay(currentDay);
  document.getElementById('nav-date').textContent = nextDate.toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});

  slots.forEach((slot, i) => {
    const bookedCount = slot.players.filter(p=>p.booked).length;
    const allBooked = bookedCount === slot.players.length;
    const noneBooked = bookedCount === 0;

    const statusClass = allBooked ? 'all' : noneBooked ? 'none' : 'partial';
    const statusText = allBooked ? 'All booked' : noneBooked ? 'Not booked' : 'Partially booked';

    const card = document.createElement('div');
    card.className = 'slot-card' + (allBooked ? ' all-booked' : '');

    const playersHTML = slot.players.map((p, pi) => {
      const c = color(p.name);
      return `<div class="player${p.booked?' booked':''}" onclick="togglePlayer(${i},${pi})">
        <div class="avatar" style="background:${c}22;color:${c}">${initials(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-status">${p.booked ? 'Booked' : 'Pending'}</div>
        </div>
        <div class="check-icon">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="slot-top">
        <div class="slot-time-wrap">
          <div class="slot-label">Court slot</div>
          <div class="slot-time">${slot.time}</div>
        </div>
        <div class="slot-status ${statusClass}">${statusText}</div>
      </div>
      <div class="slot-players">${playersHTML}</div>
      <div class="slot-footer">
        <button class="slot-action primary" onclick="bookAll(${i})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Book on Better
        </button>
        <button class="slot-action" onclick="openModal(${i})">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2L4 12H2v-2L9.5 2.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Edit players
        </button>
      </div>`;
    container.appendChild(card);
  });
}

function togglePlayer(slotIdx, playerIdx) {
  state[currentDay][slotIdx].players[playerIdx].booked ^= true;
  saveData();
  render();
  const p = state[currentDay][slotIdx].players[playerIdx];
  showToast(p.booked ? `${p.name} marked as booked` : `${p.name} marked as pending`);
}

function bookAll(slotIdx) {
  const slot = state[currentDay][slotIdx];
  const date = getNextDay(currentDay);
  const dateStr = date.toISOString().split('T')[0];
  const url = `https://www.better.org.uk/leisure-centre/rugby/queens-diamond-jubilee-centre/badminton?date=${dateStr}`;
  window.open(url, '_blank');
  showToast('Opening Better booking page...');
}

function getNextDay(dayName) {
  const days = {sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6};
  const today = new Date();
  const target = days[dayName];
  const current = today.getDay();
  let diff = target - current;
  if (diff <= 0) diff += 7;
  const next = new Date(today);
  next.setDate(today.getDate() + diff);
  return next;
}

function openModal(slotIdx) {
  editingSlot = slotIdx;
  const slot = state[currentDay][slotIdx];
  document.getElementById('modal-sub').textContent = slot.time;
  document.getElementById('inp1').value = slot.players[0]?.name || '';
  document.getElementById('inp2').value = slot.players[1]?.name || '';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg')) return;
  document.getElementById('modal-bg').classList.remove('open');
  editingSlot = null;
}

function saveModal() {
  const p1 = document.getElementById('inp1').value.trim();
  const p2 = document.getElementById('inp2').value.trim();
  const slot = state[currentDay][editingSlot];
  if (p1) slot.players[0] = {name:p1, booked: slot.players[0]?.booked||false};
  if (p2) slot.players[1] = {name:p2, booked: slot.players[1]?.booked||false};
  document.getElementById('modal-bg').classList.remove('open');
  editingSlot = null;
  saveData();
  render();
  showToast('Players updated');
}

function confirmReset() {
  if (confirm('Reset all bookings for this week?')) {
    fetch('/api/reset', {method:'POST'}).then(() => { loadData(); showToast('Bookings reset'); });
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}

loadData();
</script>
</body>
</html>
